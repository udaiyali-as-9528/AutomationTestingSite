<!DOCTYPE html>
<html lang="en">
<head>

    <!-- PageSense Tracking Snippet -->
    <script src="https://d2x98wp00fzbc2.cloudfront.net/js/diznsfqf/4d77f404941749dd8271d17240a96672.js"></script>
    <!-- End PageSense Tracking Snippet -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Clone - Order Confirmed</title>
    <style>
        :root { --primary-red: #e23744; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #fff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .confirmation-box {
            background: white; padding: 60px 40px; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 520px;
        }
        .tick { font-size: 80px; color: #22c55e; margin-bottom: 20px; }
        h1 { font-size: 42px; color: var(--primary-red); margin-bottom: 15px; }
        p { font-size: 18px; color: #444; margin: 15px 0; }
        .order-id {
            background: #f1f1f1; padding: 12px 24px; border-radius: 8px;
            display: inline-block; font-family: monospace; font-size: 20px; margin: 20px 0;
        }
        .btn {
            background: var(--primary-red); color: white; border: none;
            padding: 16px 50px; font-size: 18px; border-radius: 8px;
            cursor: pointer; margin-top: 30px;
        }
    </style>
</head>
<body onload="showConfirmation()">
    <div class="confirmation-box">
        <div class="tick">✅</div>
        <h1>Order Confirmed!</h1>
        <p>Thank you, <span id="userName" style="font-weight:600;"></span></p>
        <p>Your delicious food is on the way.</p>
        <div class="order-id">Order ID: #ZOM<span id="orderId">12345</span></div>
        <p>Total Amount Paid: ₹<span id="orderTotal" style="font-size:24px;font-weight:bold;color:var(--primary-red);">0</span></p>
        <p style="font-size:15px;color:#666;">Estimated delivery: 30-40 mins</p>
        <button onclick="goHome()" class="btn">Back to Home</button>
    </div>

    <script>
        function showConfirmation() {
            const userID = localStorage.getItem('userID') || 'Guest';
            document.getElementById('userName').textContent = userID.split('@')[0];
            const total = localStorage.getItem('totalOrderValue') || '0';
            document.getElementById('orderTotal').textContent = total;
            const randomId = Math.floor(10000 + Math.random() * 90000);
            document.getElementById('orderId').textContent = randomId;
            localStorage.removeItem('cart');
            localStorage.removeItem('totalOrderValue');
        }

        function goHome() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
