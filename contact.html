<!DOCTYPE html>
<html lang="en">
<head>

    <!-- PageSense Tracking Snippet -->
    <script src="https://d2x98wp00fzbc2.cloudfront.net/js/diznsfqf/4d77f404941749dd8271d17240a96672.js"></script>
    <!-- End PageSense Tracking Snippet -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Clone - Contact Us</title>
    <style>
        :root { --primary-red: #e23744; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; }
        header { background: var(--primary-red); color: white; padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 28px; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        #cart-icon { position: relative; cursor: pointer; font-size: 24px; }
        #cartCount { position: absolute; top: -8px; right: -8px; background: #fff; color: var(--primary-red); font-size: 12px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #userInfo { display: flex; align-items: center; gap: 10px; font-size: 15px; }
        main { padding: 40px 5%; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 38px; }
        .contact-info { text-align: center; margin-bottom: 40px; font-size: 18px; }
        .contact-info p { margin: 12px 0; }
        .map-container { margin: 30px 0; text-align: center; }
        .map-container iframe { width: 100%; max-width: 800px; height: 400px; border: none; border-radius: 12px; }
        form { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.07); }
        label { display: block; margin: 18px 0 8px; font-weight: 600; }
        input[type="email"], input[type="text"], input[type="password"], select, textarea {
            width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;
        }
        textarea { height: 140px; resize: vertical; }
        .btn { background: var(--primary-red); color: white; border: none; padding: 16px 40px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 25px; }
        footer { background: #222; color: #ddd; text-align: center; padding: 30px 5%; margin-top: 80px; }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 8% auto; padding: 30px; width: 90%; max-width: 420px; border-radius: 12px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body onload="initPage()">
    <header>
         <div class="logo">Zohota</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="veg.html">Veg</a>
            <a href="nonveg.html">Non-Veg</a>
            <a href="continental.html">Continental</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Cart</a>
        </nav>
        <div class="header-right">
            <div id="cart-icon" onclick="goToCart()">🛒 <span id="cartCount">0</span></div>
            <div id="userInfo"></div>
        </div>
    </header>

    <main>
        <h1>Contact Us</h1>
        <div class="contact-info">
            <p><strong>Email:</strong> support@zomatoclone-chengalpattu.in</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p>We're here to help 24×7!</p>
        </div>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3886.978!2d80.019!3d12.692!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a52f709a!5e0!3m2!1sen!2sin!4v1690000000000" allowfullscreen="" loading="lazy"></iframe>
        </div>
        <form id="contactForm" onsubmit="handleContactSubmit(event)">
            <label for="contactEmail">Your Email</label>
            <input type="email" id="contactEmail" name="contactEmail" required>
            <label for="queryType">Query Type</label>
            <select id="queryType" name="queryType" required>
                <option value="">Select Query Type</option>
                <option value="About Order">About Order</option>
                <option value="PR">PR / Media</option>
                <option value="Collaboration">Collaboration / Partnership</option>
            </select>
            <label for="message">Your Message</label>
            <textarea id="message" name="message" required placeholder="Tell us how we can help..."></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </main>

    <footer>&copy; 2026 Zomato Clone • Chengalpattu</footer>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="hideLoginModal()">&times;</span>
            <h2 style="margin-bottom:20px;text-align:center;color:#222;">Login to Zomato</h2>
            <input type="email" id="loginEmail" placeholder="Email (any value)" required>
            <input type="password" id="loginPassword" placeholder="Password (any value)" required>
            <button onclick="handleLogin()" class="btn">Login</button>
        </div>
    </div>

    <script>
        function getCart() { return JSON.parse(localStorage.getItem('cart')) || []; }
        function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); }
        function updateCartCount() {
            const cart = getCart();
            let count = 0;
            cart.forEach(item => count += item.qty);
            document.getElementById('cartCount').textContent = count;
        }
        function updateUserDisplay() {
            const userID = localStorage.getItem('userID');
            const userDiv = document.getElementById('userInfo');
            if (userID) {
                userDiv.innerHTML = `Hi, ${userID.split('@')[0]} <button onclick="logout()" style="margin-left:10px;padding:6px 12px;font-size:13px;background:#fff;color:var(--primary-red);border:none;border-radius:6px;cursor:pointer;">Logout</button>`;
            } else {
                userDiv.innerHTML = `<button onclick="showLoginModal()" style="padding:8px 18px;background:#fff;color:var(--primary-red);border:none;border-radius:6px;cursor:pointer;font-weight:600;">Login</button>`;
            }
        }
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (email && pass) {
                localStorage.setItem('userID', email);
                hideLoginModal();
                updateUserDisplay();
            } else {
                alert('Please enter any email and password');
            }
        }
        function logout() { localStorage.removeItem('userID'); updateUserDisplay(); }
        function showLoginModal() { document.getElementById('loginModal').style.display = 'block'; }
        function hideLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function goToCart() { window.location.href = 'cart.html'; }

        function handleContactSubmit(e) {
            e.preventDefault();
            alert("Thank you for your message! We'll get back to you soon. (Demo mode)");
            document.getElementById('contactForm').reset();
        }

        function initPage() {
            updateCartCount();
            updateUserDisplay();
        }
    </script>
</body>
</html>
