<!DOCTYPE html>
<html lang="en">
<head>

    <!-- PageSense Tracking Snippet -->
    <script src="https://d2x98wp00fzbc2.cloudfront.net/js/diznsfqf/e4bd3cc817f04a7d8ce220f63e519f47.js"></script>
    <!-- End PageSense Tracking Snippet -->
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Clone - Home</title>
    <style>
        :root { --primary-red: #e23744; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; background: #f8f9fa; color: #333; }
        header {
            background: var(--primary-red); color: white; padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: -1px; }
        nav a { color: white; text-decoration: none; margin: 0 12px; font-weight: 500; font-size: 15px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        #cart-icon { position: relative; cursor: pointer; font-size: 24px; }
        #cartCount {
            position: absolute; top: -8px; right: -8px; background: #fff; color: var(--primary-red);
            font-size: 12px; width: 20px; height: 20px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
        }
        #userInfo { display: flex; align-items: center; gap: 10px; font-size: 15px; }
        .hero {
            height: 60vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://picsum.photos/id/1016/1920/1080') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .hero-content { max-width: 700px; }
        .hero h1 { font-size: 52px; margin-bottom: 20px; }
        .hero p { font-size: 22px; margin-bottom: 30px; }
        .categories { padding: 60px 5%; background: white; }
        .section-title { text-align: center; font-size: 32px; margin-bottom: 40px; color: #222; }
        .category-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px;
        }
        .category-card {
            border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s; text-decoration: none; color: inherit;
        }
        .category-card:hover { transform: translateY(-10px); }
        .category-card img { width: 100%; height: 180px; object-fit: cover; }
        .category-card h3 { padding: 18px; text-align: center; font-size: 20px; background: #fff; }
        footer { background: #222; color: #ddd; text-align: center; padding: 30px 5%; margin-top: 80px; }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 8% auto; padding: 30px; width: 90%; max-width: 420px; border-radius: 12px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; }
        input[type="email"], input[type="password"] { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { background: var(--primary-red); color: white; border: none; padding: 14px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body onload="initPage()">

    <header>
        <div class="logo">Zomato</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="veg.html">Veg</a>
            <a href="nonveg.html">Non-Veg</a
            <a href="continental.html">Continental</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Cart</a>
        </nav>
        <div class="header-right">
            <div id="cart-icon" onclick="goToCart()">🛒 <span id="cartCount">0</span></div>
            <div id="userInfo"></div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Food Delivered Fast in Chengalpattu</h1>
            <p>Order from the best restaurants • 30 mins delivery</p>
            <button onclick="showLoginModal()" class="btn" style="font-size:18px;padding:16px 40px;">Login to Order</button>
        </div>
    </section>

    <section class="categories">
        <h2 class="section-title">Explore Cuisines</h2>
        <div class="category-grid">
            <a href="veg.html" class="category-card">
                <img src="https://picsum.photos/id/1015/600/400" alt="Veg">
                <h3>🌱 Vegetarian</h3>
            </a>
            <a href="nonVeg.html" class="category-card">
                <img src="https://picsum.photos/id/201/600/400" alt="Non-Veg">
                <h3>🍗 Non-Vegetarian</h3>
            </a>
            <a href="italian.html" class="category-card">
                <img src="https://picsum.photos/id/1080/600/400" alt="Italian">
                <h3>🍝 Italian</h3>
            </a>
            <a href="chinese.html" class="category-card">
                <img src="https://picsum.photos/id/292/600/400" alt="Chinese">
                <h3>🥢 Chinese</h3>
            </a>
            <a href="continental.html" class="category-card">
                <img src="https://picsum.photos/id/870/600/400" alt="Continental">
                <h3>🍽️ Continental</h3>
            </a>
        </div>
    </section>

    <footer>
        &copy; 2026 Zomato Clone • Chengalpattu • <a href="contact.html" style="color:#ccc;">Contact Us</a>
    </footer>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="hideLoginModal()">&times;</span>
            <h2 style="margin-bottom:20px;text-align:center;color:#222;">Login to Zomato</h2>
            <input type="email" id="loginEmail" placeholder="Email (any value)" required>
            <input type="password" id="loginPassword" placeholder="Password (any value)" required>
            <button onclick="handleLogin()" class="btn">Login</button>
        </div>
    </div>

    <script>
        function getCart() { return JSON.parse(localStorage.getItem('cart')) || []; }
        function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); }
        function updateCartCount() {
            const cart = getCart();
            let count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }
        function updateUserDisplay() {
            const userID = localStorage.getItem('userID');
            const userDiv = document.getElementById('userInfo');
            if (userID) {
                userDiv.innerHTML = `Hi, ${userID.split('@')[0]} <button onclick="logout()" style="margin-left:10px;padding:6px 12px;font-size:13px;background:#fff;color:var(--primary-red);border:none;border-radius:6px;cursor:pointer;">Logout</button>`;
            } else {
                userDiv.innerHTML = `<button onclick="showLoginModal()" style="padding:8px 18px;background:#fff;color:var(--primary-red);border:none;border-radius:6px;cursor:pointer;font-weight:600;">Login</button>`;
            }
        }
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (email && pass) {
                localStorage.setItem('userID', email);
                hideLoginModal();
                updateUserDisplay();
            } else {
                alert('Please enter any email and password');
            }
        }
        function logout() { localStorage.removeItem('userID'); updateUserDisplay(); }
        function showLoginModal() { document.getElementById('loginModal').style.display = 'block'; }
        function hideLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function goToCart() { window.location.href = 'cart.html'; }

        function initPage() {
            updateCartCount();
            updateUserDisplay();
        }
    </script>
</body>
</html>
